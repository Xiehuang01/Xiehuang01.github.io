<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刷题系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>刷题系统</h1>
        
        <div id="home-page">
            <div class="import-section">
                <h2>导入题库</h2>
                <textarea id="question-input" placeholder="请粘贴题目文本..."></textarea>
                <button id="import-btn">导入题库</button>
            </div>
            
            <div class="json-section">
                <h2>题库文件</h2>
                <p>当前已从 <span class="json-file">ttiku.json</span> 加载 <span id="json-question-count">0</span> 道题</p>
            </div>
            
            <div class="start-section">
                <h2>开始答题</h2>
                <p id="question-count">当前题库: 0 道题</p>
                <button id="start-btn" disabled>开始答题</button>
            </div>
        </div>
        
        <div id="quiz-page" style="display: none;">
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-text">题目: <span id="current-question">1</span>/<span id="total-questions">50</span></div>
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                </div>
                <div class="score-container">
                    <div class="score-text">得分: <span id="score">0</span></div>
                </div>
            </div>
            
            <div class="question-container">
                <h2 id="question-title">题目加载中...</h2>
                <div id="options-container">
                    <!-- 选项将通过JavaScript动态添加 -->
                </div>
            </div>
            
            <div class="answer-container" style="display: none;">
                <div class="result-box">
                    <div id="result-status"></div>
                    <div class="answer-info">
                        <p>你的答案: <span id="user-answer"></span></p>
                        <p>正确答案: <span id="correct-answer"></span></p>
                    </div>
                    <div id="explanation"></div>
                </div>
                <button id="next-btn">下一题</button>
            </div>
        </div>
        
        <div id="result-page" style="display: none;">
            <h2>答题结束</h2>
            <div class="final-score">
                <p>总分: <span id="final-score">0</span>/<span id="max-score">50</span></p>
                <p>正确率: <span id="accuracy">0%</span></p>
            </div>
            <div class="action-buttons">
                <button id="review-btn">查看错题</button>
                <button id="restart-btn">重新开始</button>
                <button id="home-btn">返回主页</button>
            </div>
        </div>
        
        <div id="review-page" style="display: none;">
            <h2>错题集</h2>
            <div id="wrong-questions-container">
                <!-- 错题将通过JavaScript动态添加 -->
            </div>
            <button id="back-to-results">返回结果页</button>
        </div>
    </div>
